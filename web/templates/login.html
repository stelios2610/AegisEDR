<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AegisEDR — Login</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d0f14; color: #e2e8f0; font-family: 'Segoe UI', system-ui, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .login-wrap { width: 100%; max-width: 380px; padding: 24px; }
  .logo { text-align: center; margin-bottom: 32px; }
  .logo-icon { width: 60px; height: 60px; background: linear-gradient(135deg, #6366f1, #a855f7); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 30px; margin: 0 auto 12px; }
  .logo-title { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
  .logo-sub { color: #94a3b8; font-size: 13px; margin-top: 4px; }
  .card { background: #141720; border: 1px solid #2a2f3e; border-radius: 16px; padding: 28px; }
  label { font-size: 12px; font-weight: 500; color: #94a3b8; display: block; margin-bottom: 6px; }
  input { background: #1c2030; border: 1px solid #2a2f3e; color: #e2e8f0; padding: 10px 14px; border-radius: 8px; font-size: 14px; width: 100%; margin-bottom: 16px; }
  input:focus { outline: none; border-color: #6366f1; }
  .btn { width: 100%; padding: 11px; background: #6366f1; color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.15s; }
  .btn:hover { background: #818cf8; }
  .error { background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.3); color: #ef4444; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; }
  .footer { text-align: center; margin-top: 20px; font-size: 11px; color: #475569; }
</style>
</head>
<body>
<div class="login-wrap">
  <div class="logo">
    <div class="logo-icon" style="font-family:'Arial Black',sans-serif;font-size:34px;font-weight:900;color:white;">A</div>
    <div class="logo-title">AEGIS<span style="color:#818cf8;">EDR</span></div>
    <div class="logo-sub">Endpoint Detection &amp; Response</div>
  </div>
  <div class="card">
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="post" action="/login">
      <label>Username</label>
      <input type="text" name="username" autocomplete="username" autofocus required>
      <label>Password</label>
      <input type="password" name="password" autocomplete="current-password" required>
      <button type="submit" class="btn">Sign In</button>
    </form>
  </div>
  <div class="footer">AegisEDR Security Console — Unauthorized access is prohibited</div>
</div>
</body>
</html>
